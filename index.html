<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naiteek Personal Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(48, 54, 61, 0.8); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div id="login-wall" class="fixed inset-0 bg-[#0d1117] flex items-center justify-center z-50">
        <div class="glass p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
            <i class="fa-solid fa-cloud-lock text-5xl text-blue-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-white mb-2">Naiteek Cloud</h2>
            <p class="text-gray-400 text-sm mb-6">Enter password to access your files</p>
            <input type="password" id="pass-input" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-3 text-white text-center focus:outline-none focus:border-blue-500 mb-4" placeholder="••••••••">
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded-lg transition">Unlock Dashboard</button>
            <p id="login-err" class="text-red-500 text-xs mt-3 hidden">Galat Password Hai Bhai! ❌</p>
        </div>
    </div>

    <div class="max-w-4xl w-full hidden" id="dashboard">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-[#30363d]">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cloud text-3xl text-blue-500"></i>
                <h1 class="text-2xl font-extrabold text-white tracking-wide">Naiteek Vishwakarma <span class="text-blue-500 text-sm font-normal">Personal Cloud</span></h1>
            </div>
            <button onclick="logout()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket text-xl"></i></button>
        </header>

        <div class="glass p-6 rounded-2xl mb-8 text-center border-dashed border-2 border-blue-500/30 hover:border-blue-500/60 transition relative">
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple onchange="uploadFiles()">
            <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-400 mb-3"></i>
            <p class="text-white font-medium">Click ya Drag karke files upload karein</p>
            <p class="text-xs text-gray-400 mt-1">Demo Mode: Interface check karne ke liye</p>
        </div>

        <div class="glass rounded-2xl p-6">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i class="fa-solid fa-folder-open text-yellow-500"></i> Aapki Files</h3>
            <div id="file-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            <div id="no-files" class="text-center py-12 text-gray-500">
                <i class="fa-regular fa-folder-open text-4xl mb-2"></i>
                <p>Dashboard khul gaya bhai! Supabase key sahi karte hi files dikhengi.</p>
            </div>
        </div>
    </div>

    <script>
        const SECRET_PASSWORD = "Naiteek@2026"; 

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            if(input === SECRET_PASSWORD) {
                document.getElementById('login-wall').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('pass-input').value = '';
            document.getElementById('login-wall').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        function uploadFiles() {
            alert("Bhai dashboard toh chal gaya! Ab bas Supabase ki asli Anon Key lani padegi.");
        }
    </script>
</body>
</html>
